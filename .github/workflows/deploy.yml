name: Deploy Landing

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set deploy target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "VPS_HOST=${{ secrets.VPS_MASTER_HOST }}" >> $GITHUB_ENV
          else
            echo "VPS_HOST=${{ secrets.VPS_DEV_HOST }}" >> $GITHUB_ENV
          fi

      - name: Cache-bust static assets
        run: |
          CSS_HASH=$(md5sum www/styles.css | cut -c1-8)
          JS_HASH=$(md5sum www/main.js | cut -c1-8)
          SW_HASH=$(md5sum www/sw.js | cut -c1-8)
          sed -i "s|./styles.css|./styles.css?v=${CSS_HASH}|g" www/index.html
          sed -i "s|./main.js|./main.js?v=${JS_HASH}|g" www/index.html
          sed -i "s|./sw.js|./sw.js?v=${SW_HASH}|g" www/index.html

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/deploy_key" \
            www/ \
            ${{ secrets.VPS_USER }}@$VPS_HOST:/opt/rolebaza-landing/

      - name: Fix permissions
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@$VPS_HOST \
            "chown -R root:root /opt/rolebaza-landing && \
             find /opt/rolebaza-landing -type d -exec chmod 755 {} \; && \
             find /opt/rolebaza-landing -type f -exec chmod 644 {} \;"
