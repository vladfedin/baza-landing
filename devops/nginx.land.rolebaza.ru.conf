server {
    listen 80;
    listen [::]:80;
    server_name land.rolebaza.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name land.rolebaza.ru;

    ssl_certificate /etc/letsencrypt/live/land.rolebaza.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/land.rolebaza.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/landing-rolebaza-access.log;
    error_log /var/log/nginx/landing-rolebaza-error.log;

    root /opt/rolebaza-landing;
    index index.html;

    # CORS — allow requests from prod landing
    set $cors_origin "";
    if ($http_origin ~* "^https://(www\.)?rolebaza\.ru$") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin $cors_origin always;
    }
}
